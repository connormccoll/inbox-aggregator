name: Deploy — Terraform Apply

on:
  push:
    branches: [main]

permissions:
  id-token: write   # Required for OIDC
  contents: read

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Lambda layer dependencies
        run: |
          mkdir -p .build/layer/python
          pip install --quiet \
            --target .build/layer/python \
            -r lambdas/layer/requirements.txt

      - name: Bootstrap S3 state bucket
        run: |
          BUCKET="${{ vars.TF_STATE_BUCKET }}"
          REGION="${{ vars.AWS_REGION }}"
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "State bucket '$BUCKET' already exists — skipping creation."
          else
            echo "Creating state bucket '$BUCKET'..."
            aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-public-access-block \
              --bucket "$BUCKET" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            echo "State bucket created and configured."
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -input=false
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply \
            -var="gcp_project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="bedrock_model_id=${{ vars.BEDROCK_MODEL_ID }}" \
            -var="daily_digest_cron=${{ vars.DAILY_DIGEST_CRON }}" \
            -input=false \
            -auto-approve
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
