name: Deploy — Terraform Apply

on:
  push:
    branches: [main]

permissions:
  id-token: write   # Required for OIDC
  contents: read

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Lambda layer dependencies
        run: |
          mkdir -p .build/layer/python
          pip install --quiet \
            --target .build/layer/python \
            -r lambdas/layer/requirements.txt

      - name: Bootstrap S3 state bucket
        run: |
          BUCKET="${{ vars.TF_STATE_BUCKET }}"
          REGION="${{ vars.AWS_REGION }}"
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "State bucket '$BUCKET' already exists — skipping creation."
          else
            echo "Creating state bucket '$BUCKET'..."
            aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-public-access-block \
              --bucket "$BUCKET" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            echo "State bucket created and configured."
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -input=false
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply \
            -var="gcp_project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="bedrock_model_id=${{ vars.BEDROCK_MODEL_ID }}" \
            -var="daily_digest_cron=${{ vars.DAILY_DIGEST_CRON }}" \
            -var="invitation_password=${{ secrets.INVITATION_PASSWORD }}" \
            -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -var="google_client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -input=false \
            -auto-approve
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

      - name: Get Terraform outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          echo "api_url=$(terraform output -raw api_gateway_url)" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$(terraform output -raw frontend_bucket_name 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "cf_distribution_id=$(terraform output -raw cloudfront_distribution_id 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "cognito_domain=$(terraform output -raw cognito_hosted_ui_domain 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "cognito_client_id=$(terraform output -raw cognito_client_id 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "frontend_url=$(terraform output -raw frontend_url 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ steps.tf_outputs.outputs.api_url }}
          VITE_COGNITO_DOMAIN: ${{ steps.tf_outputs.outputs.cognito_domain }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.tf_outputs.outputs.cognito_client_id }}
          VITE_REDIRECT_URI: ${{ steps.tf_outputs.outputs.frontend_url }}
        run: npm run build

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/dist/ \
            s3://${{ steps.tf_outputs.outputs.frontend_bucket }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html \
            s3://${{ steps.tf_outputs.outputs.frontend_bucket }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        if: steps.tf_outputs.outputs.cf_distribution_id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf_outputs.outputs.cf_distribution_id }} \
            --paths "/*"
